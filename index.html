<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연세대학교 EMBA 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #0f172a; color: #f8fafc; }
        header { background: linear-gradient(135deg, #001a35, #003876); padding: 30px 40px; display: flex; align-items: center; gap: 20px; border-bottom: 3px solid #b2945e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header img { height: 60px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .container { max-width: 1100px; margin: 50px auto; display: grid; gap: 30px; padding: 0 20px; }
        .card { background: rgba(30, 41, 59, 0.7); border-radius: 20px; padding: 35px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .card h2 { font-size: 24px; margin: 0 0 25px 0; display: flex; align-items: center; gap: 12px; color: #b2945e; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .link-btn { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; padding: 25px 15px; border-radius: 15px; text-decoration: none; color: white; font-weight: 700; font-size: 16px; transition: 0.4s; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .link-btn:hover { transform: translateY(-8px); filter: brightness(1.2); box-shadow: 0 12px 25px rgba(0,0,0,0.4); }
        
        /* 섹션별 화려한 그라데이션 */
        .school { background: linear-gradient(135deg, #1e3a8a, #3b82f6); } /* 블루 */
        .class17 { background: linear-gradient(135deg, #701a75, #d946ef); } /* 퍼플 */
        .alumni { background: linear-gradient(135deg, #92400e, #f59e0b); } /* 골드/오렌지 */
        
        .link-btn i { font-size: 24px; margin-bottom: 5px; opacity: 0.9; }
    </style>
</head>
<body>
<header>
    <img src="yonsei.png" alt="연세대 마크">
    <span>연세대학교 EMBA PRESTIGE 대시보드</span>
</header>
<div class="container">
    <div class="card">
        <h2><i class="fa-solid fa-building-columns"></i> 학교 공식 서비스</h2>
        <div class="btn-grid">
            <a href="https://portal.yonsei.ac.kr/" target="_blank" class="link-btn school"><i class="fa-solid fa-door-open"></i>연세대 포털</a>
            <a href="https://ys.learnus.org/" target="_blank" class="link-btn school"><i class="fa-solid fa-laptop-code"></i>LearnUs</a>
            <a href="https://yonseicoop.com/" target="_blank" class="link-btn school"><i class="fa-solid fa-cart-shopping"></i>굿즈 온라인샵</a>
        </div>
    </div>
    <div class="card">
        <h2><i class="fa-solid fa-star"></i> EMBA 17기 전용</h2>
        <div class="btn-grid">
            <a href="https://willryugo.github.io/EMBA17/" target="_blank" class="link-btn class17"><i class="fa-solid fa-chalkboard-user"></i>학술운영보드</a>
            <a href="https://willryugo.github.io/EMBA17/members_private.html" target="_blank" class="link-btn class17"><i class="fa-solid fa-address-book"></i>16,17기 명단</a>
        </div>
    </div>
    <div class="card" style="border-top: 3px solid #b2945e;">
        <h2><i class="fa-solid fa-crown"></i> 동문 네트워크</h2>
        <div class="btn-grid" style="grid-template-columns: repeat(2, 1fr);">
            <a href="https://yonsei-emba.co.kr/" target="_blank" class="link-btn alumni"><i class="fa-solid fa-id-card"></i>EMBA 동문명부</a>
            <a href="https://www.yonsein.net/" target="_blank" class="link-btn alumni"><i class="fa-solid fa-users-rectangle"></i>연세대 총동문회</a>
        </div>
    </div>
</div>
</body>
</html>
