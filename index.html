<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연세대학교 EMBA 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #ffffff; color: #333; }
        header { background: #fff; padding: 20px 40px; display: flex; align-items: center; gap: 20px; border-bottom: 3px solid #003876; }
        header img { height: 50px; }
        header span { font-size: 26px; font-weight: 700; color: #003876; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .card h2 { font-size: 18px; color: #003876; margin: 0 0 15px 10px; border-left: 4px solid #003876; padding-left: 10px; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .link-btn { 
            display: flex; align-items: center; justify-content: center; 
            padding: 20px 10px; border-radius: 12px; text-decoration: none; 
            background: linear-gradient(to bottom, #ffffff, #f1f1f1);
            border: 2px solid #003876; color: #003876; transition: 0.2s;
        }
        .link-btn span { font-size: 22px; font-weight: 700; } /* 글씨 대폭 확대 */
        
        .link-btn:hover { background: #003876; color: #fff; transform: translateY(-3px); }

        /* 17기 전용 메뉴는 포인트 컬러로 강조 */
        .special { border-color: #003876; background: linear-gradient(to bottom, #004a99, #003876); color: #fff !important; }
    </style>
</head>
<body>
<header>
    <img src="yonsei.jpg" alt="연세대 로고">
    <span>연세대학교 EMBA 대시보드</span>
</header>
<div class="container">
    <div class="card">
        <h2>학교 공식 서비스</h2>
        <div class="btn-grid">
            <a href="https://portal.yonsei.ac.kr/" target="_blank" class="link-btn"><span>연세대 포털</span></a>
            <a href="https://ys.learnus.org/" target="_blank" class="link-btn"><span>LearnUs</span></a>
            <a href="https://yonseicoop.com/" target="_blank" class="link-btn"><span>굿즈 샵</span></a>
        </div>
    </div>
    <div class="card">
        <h2>17기 전용 메뉴</h2>
        <div class="btn-grid">
            <a href="https://willryugo.github.io/EMBA17/" target="_blank" class="link-btn special"><span>학술운영보드</span></a>
            <a href="https://willryugo.github.io/EMBA17/members_private.html" target="_blank" class="link-btn special"><span>16,17기 명단</span></a>
        </div>
    </div>
    <div class="card">
        <h2>동문 네트워크</h2>
        <div class="btn-grid">
            <a href="https://yonsei-emba.co.kr/" target="_blank" class="link-btn"><span>EMBA 동문</span></a>
            <a href="https://www.yonsein.net/" target="_blank" class="link-btn"><span>총동문회</span></a>
        </div>
    </div>
</div>
</body>
</html>
