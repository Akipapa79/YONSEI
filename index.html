<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연세대학교 EMBA 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #eef3f9 0%, #f8fafc 100%); color: #1e293b; }
        
        header { background: linear-gradient(135deg, #002b5c 0%, #003876 45%, #1d4ed8 100%); padding: 18px 40px; display: flex; align-items: center; gap: 18px; color: #fff; border-bottom: 3px solid #c5a46d; box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
        header img { height: 48px; background: rgba(255,255,255,0.95); border-radius: 50%; padding: 5px; }
        header span { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        
        .container { max-width: 1050px; margin: 20px auto; padding: 0 20px; }
        .card { background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-radius: 18px; padding: 22px 28px; margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 10px 28px rgba(15,23,42,0.08); }
        .card h2 { font-size: 19px; color: #0f172a; margin: 0 0 18px 0; display: flex; align-items: center; gap: 10px; font-weight: 800; }
        .card h2 i { color: #2563eb; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        
        /* 뚜렷한 글씨, 컴팩트한 박스, 펄 입체감 적용 */
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 14px 20px; border-radius: 12px;
            text-decoration: none; color: #fff;
            font-weight: 800; font-size: 20px;
            transition: 0.25s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            position: relative; overflow: hidden;
        }
        
        .link-btn::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to top right, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            border-radius: 11px; pointer-events: none;
        }
        
        .link-btn:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.15); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .link-btn span { position: relative; z-index: 2; }

        /* 선명한 입체 그라데이션 컬러 */
        .btn-royal {
            background: linear-gradient(135deg, #002266 0%, #004dc7 35%, #9cc6ff 40%, #00308a 60%, #001f4d 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.15), 0 8px 18px rgba(0,82,217,0.32);
        }
        .btn-slate {
            background: linear-gradient(135deg, #3a006d 0%, #a44dff 35%, #edccff 40%, #611bbe 60%, #1e0038 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.15), 0 8px 18px rgba(123,34,217,0.3);
        }
        .btn-dark {
            background: linear-gradient(135deg, #004c38 0%, #00a379 35%, #a6f6df 40%, #00664d 60%, #002e1f 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.15), 0 8px 18px rgba(0,143,104,0.3);
        }

        @media (max-width: 768px) {
            .btn-grid { grid-template-columns: 1fr; }
            header { padding: 16px 20px; }
            header span { font-size: 20px; }
        }
    </style>
</head>
<body>

<header>
    <img src="yonsei.jpg" alt="연세대 로고">
    <span>연세대학교 EMBA 대시보드</span>
</header>

<div class="container">
    <div class="card">
        <h2><i class="fa-solid fa-school"></i> 학교 서비스</h2>
        <div class="btn-grid">
            <a href="https://portal.yonsei.ac.kr/" target="_blank" class="link-btn btn-royal">
                <span>연세대 포털</span>
            </a>
            <a href="https://ys.learnus.org/" target="_blank" class="link-btn btn-royal">
                <span>LearnUs</span>
            </a>
            <a href="https://yonseicoop.com/" target="_blank" class="link-btn btn-royal">
                <span>굿즈 샵</span>
            </a>
        </div>
    </div>

    <div class="card">
        <h2><i class="fa-solid fa-star"></i> 17기 전용</h2>
        <div class="btn-grid">
            <a href="https://willryugo.github.io/EMBA17/" target="_blank" class="link-btn btn-slate">
                <span>학술운영보드</span>
            </a>
            <a href="https://willryugo.github.io/EMBA17/members_private.html" target="_blank" class="link-btn btn-slate">
                <span>16·17기 명단</span>
            </a>
        </div>
    </div>

    <div class="card">
        <h2><i class="fa-solid fa-crown"></i> 동문 네트워크</h2>
        <div class="btn-grid">
            <a href="https://yonsei-emba.co.kr/" target="_blank" class="link-btn btn-dark">
                <span>EMBA 동문</span>
            </a>
            <a href="https://www.yonsein.net/" target="_blank" class="link-btn btn-dark">
                <span>총동문회</span>
            </a>
        </div>
    </div>
</div>

</body>
</html>
