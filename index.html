<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연세대학교 EMBA 대시보드</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background:
            linear-gradient(135deg, #eef3f9 0%, #f8fafc 100%);
            color: #1e293b;
        }

        /* 헤더 */

        header {
            background:
            linear-gradient(135deg,
            #002b5c 0%,
            #003876 45%,
            #1d4ed8 100%);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            gap: 18px;
            color: #fff;
            border-bottom: 3px solid #c5a46d;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        header img {
            height: 48px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            padding: 5px;
        }

        header span {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* 전체 */

        .container {
            max-width: 1050px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* 카드 */

        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 22px 28px;
            box-shadow:
            0 10px 28px rgba(15,23,42,0.08);
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .card h2 {
            font-size: 19px;
            color: #0f172a;
            margin: 0 0 18px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 i {
            color: #2563eb;
        }

        /* 버튼 그리드 */

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        /* 버튼 공통 */

        .link-btn {
            position: relative;
            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            padding: 18px 10px;
            border-radius: 16px;

            text-decoration: none;
            color: #fff;

            transition: 0.28s ease;

            box-shadow:
            0 8px 22px rgba(0,0,0,0.12);
        }

        .link-btn::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 220%;

            background:
            linear-gradient(
            120deg,
            rgba(255,255,255,0.05),
            rgba(255,255,255,0.32),
            rgba(255,255,255,0.05)
            );

            transform: rotate(15deg);
        }

        .link-btn:hover {
            transform: translateY(-4px) scale(1.01);
            filter: brightness(1.05);
        }

        .link-btn span {
            position: relative;
            z-index: 2;

            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* 색상 */

        /* 학교 */

        .btn-royal {
            background:
            linear-gradient(135deg,
            #1e3a8a 0%,
            #2563eb 40%,
            #60a5fa 100%);
        }

        /* 17기 */

        .btn-slate {
            background:
            linear-gradient(135deg,
            #5b21b6 0%,
            #7c3aed 45%,
            #c084fc 100%);
        }

        /* 동문 */

        .btn-dark {
            background:
            linear-gradient(135deg,
            #047857 0%,
            #10b981 45%,
            #6ee7b7 100%);
        }

        /* 반응형 */

        @media (max-width: 768px) {

            .btn-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 16px 20px;
            }

            header span {
                font-size: 20px;
            }

        }

    </style>
</head>

<body>

<header>
    <img src="yonsei.jpg" alt="연세대 로고">
    <span>연세대학교 EMBA PRESTIGE</span>
</header>

<div class="container">

    <!-- 학교 서비스 -->

    <div class="card">

        <h2>
            <i class="fa-solid fa-school"></i>
            학교 서비스
        </h2>

        <div class="btn-grid">

            <a href="https://portal.yonsei.ac.kr/"
               target="_blank"
               class="link-btn btn-royal">

                <span>연세대 포털</span>

            </a>

            <a href="https://ys.learnus.org/"
               target="_blank"
               class="link-btn btn-royal">

                <span>LearnUs</span>

            </a>

            <a href="https://yonseicoop.com/"
               target="_blank"
               class="link-btn btn-royal">

                <span>굿즈 샵</span>

            </a>

        </div>

    </div>

    <!-- 17기 -->

    <div class="card">

        <h2>
            <i class="fa-solid fa-star"></i>
            17기 전용
        </h2>

        <div class="btn-grid">

            <a href="https://willryugo.github.io/EMBA17/"
               target="_blank"
               class="link-btn btn-slate">

                <span>학술운영보드</span>

            </a>

            <a href="https://willryugo.github.io/EMBA17/members_private.html"
               target="_blank"
               class="link-btn btn-slate">

                <span>16·17기 명단</span>

            </a>

        </div>

    </div>

    <!-- 동문 -->

    <div class="card">

        <h2>
            <i class="fa-solid fa-crown"></i>
            동문 네트워크
        </h2>

        <div class="btn-grid">

            <a href="https://yonsei-emba.co.kr/"
               target="_blank"
               class="link-btn btn-dark">

                <span>EMBA 동문</span>

            </a>

            <a href="https://www.yonsein.net/"
               target="_blank"
               class="link-btn btn-dark">

                <span>총동문회</span>

            </a>

        </div>

    </div>

</div>

</body>
</html>
