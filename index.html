<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연세대학교 EMBA 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #f8f9fa; color: #333; }
        header { background: #003876; padding: 25px 40px; display: flex; align-items: center; gap: 20px; color: white; font-size: 28px; font-weight: 700; border-bottom: 5px solid #b2945e; }
        header img { height: 60px; background: white; border-radius: 50%; padding: 5px; }
        .container { max-width: 1100px; margin: 40px auto; display: grid; gap: 30px; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card h2 { font-size: 24px; color: #003876; margin-top: 0; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .link-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 15px; border-radius: 15px; text-decoration: none; color: white; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .link-btn span { font-size: 20px; font-weight: 700; margin-top: 10px; } 
        .link-btn i { font-size: 30px; }
        .link-btn:hover { transform: translateY(-5px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        
        /* 세련된 파스텔 그라데이션 */
        .btn-blue { background: linear-gradient(135deg, #6a9edb, #3b82f6); }
        .btn-purple { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
        .btn-gold { background: linear-gradient(135deg, #fbbf24, #d97706); }
    </style>
</head>
<body>
<header>
    <img src="yonsei.jpg" alt="연세대 로고"> 
    <span>연세대학교 EMBA 대시보드</span>
</header>
<div class="container">
    <div class="card">
        <h2><i class="fa-solid fa-school"></i> 학교 공식 서비스</h2>
        <div class="btn-grid">
            <a href="https://portal.yonsei.ac.kr/" target="_blank" class="link-btn btn-blue"><i class="fa-solid fa-door-open"></i><span>연세대 포털</span></a>
            <a href="https://ys.learnus.org/" target="_blank" class="link-btn btn-blue"><i class="fa-solid fa-laptop-code"></i><span>LearnUs</span></a>
            <a href="https://yonseicoop.com/" target="_blank" class="link-btn btn-blue"><i class="fa-solid fa-cart-shopping"></i><span>굿즈 온라인샵</span></a>
        </div>
    </div>
    <div class="card">
        <h2><i class="fa-solid fa-star"></i> 17기 전용 메뉴</h2>
        <div class="btn-grid">
            <a href="https://willryugo.github.io/EMBA17/" target="_blank" class="link-btn btn-purple"><i class="fa-solid fa-chalkboard-user"></i><span>학술운영보드</span></a>
            <a href="https://willryugo.github.io/EMBA17/members_private.html" target="_blank" class="link-btn btn-purple"><i class="fa-solid fa-address-book"></i><span>16,17기 명단</span></a>
        </div>
    </div>
    <div class="card">
        <h2><i class="fa-solid fa-crown"></i> 동문 네트워크</h2>
        <div class="btn-grid" style="grid-template-columns: repeat(2, 1fr);">
            <a href="https://yonsei-emba.co.kr/" target="_blank" class="link-btn btn-gold"><i class="fa-solid fa-id-card"></i><span>EMBA 동문명부</span></a>
            <a href="https://www.yonsein.net/" target="_blank" class="link-btn btn-gold"><i class="fa-solid fa-users-rectangle"></i><span>연세대 총동문회</span></a>
        </div>
    </div>
</div>
</body>
</html>
